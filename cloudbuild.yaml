steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-f",
        "backend/Dockerfile",
        "-t",
        "gcr.io/$PROJECT_ID/ai-blasting-backend:${_IMAGE_TAG}",
        ".",
      ]
    id: "build-backend-image"

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "gcr.io/$PROJECT_ID/ai-blasting-backend:${_IMAGE_TAG}",
      ]
    id: "push-backend-image"

  # Deploy to Cloud Run (requires Cloud Build SA to have run.admin + iam.serviceAccountUser)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      [
        "run",
        "deploy",
        "ai-blasting-backend",
        "--image",
        "gcr.io/$PROJECT_ID/ai-blasting-backend:${_IMAGE_TAG}",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--quiet",
      ]

images:
  - "gcr.io/$PROJECT_ID/ai-blasting-backend:${_IMAGE_TAG}"

substitutions:
  _IMAGE_TAG: "${SHORT_SHA}"
